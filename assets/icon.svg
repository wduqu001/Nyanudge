<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">

  <!-- Background — deep warm dark, squircle -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232" fill="#1A1512"/>

  <!-- Subtle warm inner vignette ring — very low opacity -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232"
        fill="none" stroke="#E97B22" stroke-width="2" opacity="0.18"/>

  <!-- === Mochi cat — centered at (512, 480), scale ~10.67× from 72-unit space === -->
  <g transform="translate(256, 110) scale(10.67)">

    <!-- Tail — gentle curve, resting position -->
    <path d="M44 54 Q58 46 52 34"
          stroke="#3A3835" stroke-width="5" stroke-linecap="round" fill="none"/>

    <!-- Body -->
    <ellipse cx="36" cy="52" rx="22" ry="17" fill="#F0EEE8"/>

    <!-- Left ear outer + inner -->
    <polygon points="18,16 11,3 25,10" fill="#F0EEE8"/>
    <polygon points="19,15 13,5 24,11" fill="#FFD4D4"/>

    <!-- Right ear outer + inner -->
    <polygon points="54,16 61,3 47,10" fill="#F0EEE8"/>
    <polygon points="53,15 59,5 48,11" fill="#FFD4D4"/>

    <!-- Head -->
    <circle cx="36" cy="29" r="19" fill="#F0EEE8"/>

    <!-- Eyes -->
    <ellipse cx="27" cy="28" rx="4.2" ry="4.8" fill="#2A2A2A"/>
    <ellipse cx="45" cy="28" rx="4.2" ry="4.8" fill="#2A2A2A"/>

    <!-- Eye shines -->
    <circle cx="28.8" cy="26.2" r="1.6" fill="white"/>
    <circle cx="46.8" cy="26.2" r="1.6" fill="white"/>

    <!-- Nose -->
    <ellipse cx="36" cy="34.5" rx="2.2" ry="1.7" fill="#FFB3B3"/>

    <!-- Mouth — gentle smile -->
    <path d="M31.5 37 Q36 40 40.5 37"
          stroke="#C8C6C0" stroke-width="1.4" fill="none" stroke-linecap="round"/>

    <!-- Whiskers -->
    <line x1="38" y1="34" x2="50" y2="31" stroke="#C8C6C0" stroke-width="0.9"/>
    <line x1="38" y1="36" x2="50" y2="37" stroke="#C8C6C0" stroke-width="0.9"/>
    <line x1="34" y1="34" x2="22" y2="31" stroke="#C8C6C0" stroke-width="0.9"/>
    <line x1="34" y1="36" x2="22" y2="37" stroke="#C8C6C0" stroke-width="0.9"/>

    <!-- Clock / bell on chest — the signature brand element -->
    <circle cx="36" cy="51" r="8.5" fill="#2C2C2A" stroke="#E97B22" stroke-width="1.6"/>
    <circle cx="36" cy="51" r="1.2" fill="#E97B22"/>
    <!-- Clock hands -->
    <line x1="36" y1="51" x2="36" y2="45" stroke="#E97B22" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="36" y1="51" x2="40" y2="53" stroke="#888780" stroke-width="1.1" stroke-linecap="round"/>

  </g>

</svg>
